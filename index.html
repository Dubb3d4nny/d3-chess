<!DOCTYPE html>
<html>
<head>
    <title>D3 Pro-Mimic Chess</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #board { width: 90vw; max-width: 400px; }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #00ffcc; }
    </style>
</head>
<body>
    <div id="board"></div>
    <div class="status" id="status">D3 PRO-MIMIC ONLINE</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make it full screen

        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            position: 'start',
            onDrop: function(source, target) {
                // Send the move to your Colab Brain
                tg.sendData(JSON.stringify({move: source + target}));
            }
        });

        // Listen for the bot's move
        tg.onEvent('mainButtonClicked', function() {
            tg.close();
        });
    </script>
</body>
</html>
